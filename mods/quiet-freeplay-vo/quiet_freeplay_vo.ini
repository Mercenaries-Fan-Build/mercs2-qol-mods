[quiet_freeplay_vo]

; What to do with the freeplay VO class (the idle "nag" + proximity/POI hints):
;   off      = observe only; suppress nothing (use with log_all_cues to discover cues)
;   throttle = allow at most one matching cue per throttle_seconds (default)
;   silence  = drop every matching cue
mode = throttle

; Minimum seconds between allowed freeplay cues when mode = throttle.
; 900 = 15 minutes.
throttle_seconds = 900

; The mod stays dormant (all VO passes through) until the world load reaches this
; loadprobe ladder phase, so the shell/menus are never touched. Default 10 =
; "WORLD LOAD START". Use 11 for "Player spawn", or a later phase to delay arming.
arm_phase = 10

; Log every cue name VO.Cue is asked to play. Leave on at first so you can confirm
; the real cue strings on your game build and extend `prefixes` below. The log is
; written to quiet_freeplay_vo.log next to this file.
log_all_cues = 1

; Comma- or semicolon-separated cue-name PREFIXES that define the "freeplay" class.
; A cue is suppressed/throttled only if its name starts with one of these (case-
; insensitive). Mission/briefing/cinematic dialog uses other cue names and is never
; touched. Defaults cover the idle nag and the POI/proximity hints.
prefixes = Fiona.Misc.NoState, Fiona.Hints.
