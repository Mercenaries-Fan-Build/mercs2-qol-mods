; multiplayer-restore configuration.
; Drop this next to multiplayer_restore.asi in your game folder.

[server]
; Hostname or dotted-quad of the FESL server to redirect EA traffic to.
; The default points at the public Merc2Reborn relay run by loganw.
; Override only if you're hosting your own server (see
; https://github.com/loganw234/Mercenaries2 for setup notes).
ip = refesl.live

[compat]
; 1 = spoof the system clock to a date inside the served cert's
;     validity window (2012-06-15). Belt-and-braces with the
;     WinVerifyTrust blindfold; recommended on.
; 0 = leave the clock alone. May break the SSL handshake on systems
;     whose CRT cert-expiry check fires before WinVerifyTrust does.
spoof_clock = 1

; FESL CA pubkey patch: a 128-byte write into the game's .rdata (the
; MLoader patch) that sets the CA key the FESL SSL stack validates against.
; Required for the FESL handshake: that stack is a statically-linked
; OpenSSL trusting a CA key baked into the EXE (not WinVerifyTrust), and on
; the cracked EXE that key isn't EA's, so even the genuine EA cert fails to
; validate without this. Verified live: handshake resets off / completes on.
; 1 = on (default).
; 0 = off. Only if you serve a cert under a different CA and ship your own
;     128-byte key payload; otherwise the handshake will fail.
ca_key_patch = 1
